# Instituciones Gubernamentales NO municipales con presencia en el Suroccidente
# Relevantes para ampliar el estudio de gobierno electrónico regional.
#
# Justificación metodológica:
#   Aunque el alcance principal de la investigación son las municipalidades,
#   incluir entidades gubernamentales nacionales con presencia regional
#   permite contextualizar el estado del e-government guatemalteco completo
#   y comparar la calidad técnica entre niveles (municipal vs nacional).
#
# Categorías de portales incluidos:
#   - cabecera_departamental: Gobernación departamental
#   - ministerio_regional: Sede regional/delegación de ministerios
#   - autonoma: Entidades autónomas con sede en la región
#   - transparencia_nacional: Sistema IAP y portales transversales
#   - educacion_publica: USAC y otras universidades públicas con sede regional
#   - salud_publica: Hospitales y áreas de salud regionales
#
# Estructura idéntica a municipios.yaml. Se carga con: --instituciones

instituciones:
