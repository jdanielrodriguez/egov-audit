name: egov-planner (plan semanal aleatorio)

# Genera el plan aleatorio de la próxima semana (qué días y a qué horas correrá
# la recolección) y lo commitea. Se ejecuta los domingos; también se puede
# disparar a mano desde la pestaña Actions (Run workflow).

on:
  schedule:
    - cron: '17 6 * * 0'    # domingo 06:17 UTC ≈ 00:17 hora de Guatemala (evita el pico)
  workflow_dispatch:

permissions:
  contents: write             # para commitear schedule/plan-semana.json

concurrency:
  group: egov-planner
  cancel-in-progress: false

jobs:
  planificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generar plan de la semana
        run: python3 -m src.schedule.planner

      - name: Commit del plan
        run: |
          git config user.name "egov-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule/plan-semana.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el plan."
          else
            git commit -m "plan: semana aleatoria [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
