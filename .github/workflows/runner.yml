name: egov-recoleccion (corrida horaria con gate)

# Se dispara cada hora. Un "gate" liviano (solo stdlib, sin instalar nada)
# consulta el plan semanal: si la hora actual NO está planificada, el job
# termina en segundos. Si SÍ está, instala dependencias, corre la auditoría de
# los portales del Suroccidente y commitea los snapshots a data/daily/.

on:
  schedule:
    # minuto :17 (no :00): evita el pico global de cron → menos retrasos/descartes.
    # Da igual el minuto exacto: el gate compara solo la HORA, no los minutos.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write             # para commitear los snapshots

concurrency:
  group: egov-recoleccion     # serializa: nunca dos corridas pisándose el push
  cancel-in-progress: false

jobs:
  recolectar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Gate: usa el python3 preinstalado del runner (no instala nada).
      - name: ¿Toca recolectar a esta hora?
        id: gate
        run: python3 -m src.schedule.should_run

      - name: Configurar Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Corrida de recolección (Suroccidente)
        if: steps.gate.outputs.run == 'true'
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}   # opcional
        run: python run_daily.py

      - name: Commit de los snapshots
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "egov-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily/
          if git diff --cached --quiet; then
            echo "Sin snapshots nuevos."
          else
            git commit -m "datos: corrida $(date -u +%FT%TZ) [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
