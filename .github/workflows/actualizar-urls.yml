name: egov-actualizar-urls (catálogo semanal)

# Verifica/actualiza el catálogo de URLs ANTES del planner cada domingo:
# prueba las URLs en uso, reemplaza las que fallan (si hay alternativa),
# descubre las que activaron su sitio, y escribe los overrides + el registro.
# NO modifica municipios.yaml ni genera CSV.
#
# Lo dispara cron-job.org vía workflow_dispatch (un 3er cronjob los domingos,
# a una hora ANTERIOR a la del planner). El schedule nativo no se usa.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: egov-actualizar-urls
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar catálogo de URLs (verificar / reemplazar / descubrir)
        run: python main.py --descubrir --escribir

      - name: Commit del catálogo (overrides + registro)
        run: |
          git config user.name "egov-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/urls_overrides.json config/url_registro.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el catálogo de URLs."
          else
            git commit -m "urls: actualizacion semanal del catalogo [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
